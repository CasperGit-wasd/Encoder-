<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Encoder v0.7
</title>


<style>

body{

    font-family:
    Arial, sans-serif;

    background:#111;

    color:white;

    margin:0;

    padding:20px;

}


.container{

    max-width:900px;

    margin:auto;

}


textarea{

    width:100%;

    height:160px;

    background:#222;

    color:white;

    border:1px solid #555;

    padding:12px;

    font-size:16px;

    box-sizing:border-box;

}



button,
select{

    padding:10px;

    margin:5px;

    background:#333;

    color:white;

    border:1px solid #777;

    cursor:pointer;

}



button:hover{

    background:#555;

}


.mode{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

}


.card{

    background:#1b1b1b;

    padding:15px;

    margin-top:15px;

    border-radius:8px;

}


</style>

</head>


<body>


<div class="container">


<h1>
🔐 Encoder v0.7
</h1>


<div class="card">

<h3>
Input
</h3>

<textarea id="input"
placeholder="Enter your message">
</textarea>


</div>



<div class="card">

<h3>
Mode
</h3>


<div class="mode">


<button onclick="setMode('secret')">
🔒 Secret
</button>


<button onclick="setMode('hidden')">
👻 Hidden
</button>


<button onclick="setMode('style')">
🎨 Style
</button>


<button onclick="setMode('tiny')">
🐜 Tiny
</button>


</div>


</div>


<div class="card">


<button onclick="generate()">
Generate
</button>


<button onclick="decode()">
Decode
</button>


<button onclick="copyOutput()">
Copy
</button>


</div>



<div class="card">

<h3>
Output
</h3>


<textarea id="output"
readonly>
</textarea>


</div>



<div id="status">

Ready

</div>


</div>

<script src="core/engine.js"></script>
<script src="core/pipeline.js"></script>

<script src="modules/unicode.js"></script>
<script src="modules/base64.js"></script>
<script src="modules/invisible.js"></script>
<script src="modules/zalgo.js"></script>
<script src="modules/strike.js"></script>
<script src="modules/ant.js"></script>
<script src="modules/fonts.js"></script>


<script>


// ===============================
// Encoder v0.7 Controller
// ===============================


let currentMode = "secret";




// Select mode

function setMode(mode){

    currentMode = mode;

    document.getElementById("status")
    .innerText =
    "Mode: " + mode;

}




// Encode

async function generate(){


    let text =
    document.getElementById("input")
    .value;



    if(!text){

        status("Please enter text");

        return;

    }



    let recipe =
    Pipeline.get(currentMode);



    try{


        let result =
        await engine.encode(
            text,
            recipe
        );



        document.getElementById("output")
        .value=result;



        status(
        "Generated using: "
        + currentMode
        );


    }


    catch(error){

        status(error.message);

    }


}







// Decode

async function decode(){


    let text =
    document.getElementById("input")
    .value;



    let recipe =
    Pipeline.get(currentMode);



    try{


        let result =
        await engine.decode(
            text,
            recipe
        );



        document.getElementById("output")
        .value=result;



        status(
        "Decoded"
        );


    }


    catch(error){

        status(error.message);

    }


}








// Copy output

function copyOutput(){


    let output =
    document.getElementById("output");


    navigator.clipboard.writeText(
        output.value
    );


    status(
    "Copied"
    );


}







function status(text){

    document.getElementById("status")
    .innerText=text;

}



</script>


</body>

</html>
