<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Encoder</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.box{
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:150px;
background:#222;
color:white;
padding:10px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>🔐Encoder</h1>

<textarea id="input"
placeholder="EnterMessage"></textarea>

<br>

<button onclick="encode()">
Encode
</button>

<button onclick="decode()">
Decode
</button>

<button onclick="copyText()">
Copy
</button>


<h3>Result</h3>

<textarea id="output"></textarea>

</div>


<script>


let data="";


function encode(){

let text=
document.getElementById("input").value;


data=btoa(
unescape(
encodeURIComponent(text)
)
);


document.getElementById("output")
.value=data;

}



function decode(){

let text=
document.getElementById("input").value;


try{

data=
decodeURIComponent(
escape(
atob(text)
)
);


document.getElementById("output")
.value=data;

}

catch{

document.getElementById("output")
.value=
"Invalid encoded text";

}

}



function copyText(){

navigator.clipboard.writeText(
document.getElementById("output").value
);

}


</script>


</body>
</html>
